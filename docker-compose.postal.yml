# Optional Postal local overlay.
# Use with docker-compose.dev.yml through `pnpm dev:start:postal` or `pnpm postal:up`.

services:
  postal-init:
    image: ${POSTAL_IMAGE:-ghcr.io/postalserver/postal:latest}
    user: "0:0"
    restart: "no"
    command:
      - /bin/sh
      - -ec
      - |
        mkdir -p /config
        chown 999:999 /config

        if [ ! -f /config/signing.key ]; then
          if command -v openssl >/dev/null 2>&1; then
            openssl genrsa -out /config/signing.key 2048
          else
            ruby -ropenssl -e "key = OpenSSL::PKey::RSA.new(2048); File.write('/config/signing.key', key.to_pem)"
          fi

          chown 999:999 /config/signing.key
          chmod 600 /config/signing.key
        fi

        cat > /config/postal.yml <<EOF
        version: 2

        postal:
          web_hostname: ${POSTAL_WEB_HOSTNAME:-postal.example.com}
          web_protocol: ${POSTAL_WEB_PROTOCOL:-https}
          smtp_hostname: ${POSTAL_SMTP_HOSTNAME:-postal.example.com}

        main_db:
          host: postal-db
          username: root
          password: ${POSTAL_DB_ROOT_PASSWORD:-postal}
          database: ${POSTAL_DB_NAME:-postal}

        message_db:
          host: postal-db
          username: root
          password: ${POSTAL_DB_ROOT_PASSWORD:-postal}
          prefix: ${POSTAL_MESSAGE_DB_PREFIX:-postal}

        logging:
          rails_log_enabled: true
          highlighting_enabled: false

        rails:
          environment: development
          secret_key: ${POSTAL_RAILS_SECRET_KEY:-change-me-in-production}
        EOF

        chown 999:999 /config/postal.yml
        chmod 640 /config/postal.yml
    volumes:
      - postal_config_data:/config

  postal-db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${POSTAL_DB_NAME:-postal}
      MARIADB_ROOT_PASSWORD: ${POSTAL_DB_ROOT_PASSWORD:-postal}
    expose:
      - "3306"
    volumes:
      - postal_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping --host=127.0.0.1 --user=root --password=${POSTAL_DB_ROOT_PASSWORD:-postal}"]
      interval: 10s
      timeout: 5s
      retries: 10

  postal-web:
    image: ${POSTAL_IMAGE:-ghcr.io/postalserver/postal:latest}
    restart: unless-stopped
    depends_on:
      postal-db:
        condition: service_healthy
      postal-init:
        condition: service_completed_successfully
    entrypoint: ["/docker-entrypoint.sh"]
    command: ["bundle", "exec", "puma", "-C", "config/puma.rb"]
    environment:
      POSTAL_CONFIG_FILE_PATH: /config/postal.yml
      POSTAL_SIGNING_KEY_PATH: /config/signing.key
      WAIT_FOR_TIMEOUT: 90
      WAIT_FOR_TARGETS: postal-db:3306
      BIND_ADDRESS: 0.0.0.0
      PORT: 5000
    expose:
      - "5000"
    volumes:
      - postal_config_data:/config
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5000"]
      interval: 10s
      timeout: 5s
      retries: 10

  postal-worker:
    image: ${POSTAL_IMAGE:-ghcr.io/postalserver/postal:latest}
    restart: unless-stopped
    depends_on:
      postal-db:
        condition: service_healthy
      postal-web:
        condition: service_started
      postal-init:
        condition: service_completed_successfully
    entrypoint: ["/docker-entrypoint.sh"]
    command: ["bundle", "exec", "ruby", "script/worker.rb"]
    environment:
      POSTAL_CONFIG_FILE_PATH: /config/postal.yml
      POSTAL_SIGNING_KEY_PATH: /config/signing.key
      WAIT_FOR_TIMEOUT: 90
      WAIT_FOR_TARGETS: postal-db:3306
    volumes:
      - postal_config_data:/config

  postal-smtp:
    image: ${POSTAL_IMAGE:-ghcr.io/postalserver/postal:latest}
    restart: unless-stopped
    depends_on:
      postal-db:
        condition: service_healthy
      postal-web:
        condition: service_started
      postal-init:
        condition: service_completed_successfully
    entrypoint: ["/docker-entrypoint.sh"]
    command: ["bundle", "exec", "ruby", "script/smtp_server.rb"]
    environment:
      POSTAL_CONFIG_FILE_PATH: /config/postal.yml
      POSTAL_SIGNING_KEY_PATH: /config/signing.key
      WAIT_FOR_TIMEOUT: 90
      WAIT_FOR_TARGETS: postal-db:3306
    expose:
      - "25"
    volumes:
      - postal_config_data:/config
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 25"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postal_db_data:
  postal_config_data: