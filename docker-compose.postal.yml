# Optional Postal local overlay.
# Use with docker-compose.dev.yml through `pnpm dev:start:postal` or `pnpm postal:up`.

x-postal-runtime-common: &postal-runtime-common
  image: ${POSTAL_IMAGE:-ghcr.io/postalserver/postal:latest}
  restart: unless-stopped
  entrypoint: [ "/docker-entrypoint.sh" ]
  environment:
    POSTAL_CONFIG_FILE_PATH: /config/postal.yml
    POSTAL_SIGNING_KEY_PATH: /config/signing.key
    WAIT_FOR_TIMEOUT: 90
    WAIT_FOR_TARGETS: postal-db:3306
  volumes:
    - postal_config_data:/config

x-postal-depends-on: &postal-depends-on
  postal-db:
    condition: service_healthy
  postal-init:
    condition: service_completed_successfully
  postal-config:
    condition: service_completed_successfully

services:
  # Generates postal.yml and signing.key into the shared config volume.
  # Uses the same config.mjs logic as the host-side postal.mjs script — no duplication.
  postal-config:
    image: node:20-alpine
    restart: "no"
    environment:
      POSTAL_CONFIG_DIR: /config
      POSTAL_WEB_HOSTNAME: ${POSTAL_WEB_HOSTNAME:?POSTAL_WEB_HOSTNAME is required}
      POSTAL_WEB_PROTOCOL: ${POSTAL_WEB_PROTOCOL:-https}
      POSTAL_SMTP_HOSTNAME: ${POSTAL_SMTP_HOSTNAME:?POSTAL_SMTP_HOSTNAME is required}
      POSTAL_DB_ROOT_PASSWORD: ${POSTAL_DB_ROOT_PASSWORD:-postal}
      POSTAL_DB_NAME: ${POSTAL_DB_NAME:-postal}
      POSTAL_MESSAGE_DB_PREFIX: ${POSTAL_MESSAGE_DB_PREFIX:-postal}
      POSTAL_RAILS_SECRET_KEY: ${POSTAL_RAILS_SECRET_KEY:-}
      POSTAL_DNS_MX_RECORDS: ${POSTAL_DNS_MX_RECORDS:-}
      POSTAL_DNS_SPF_INCLUDE: ${POSTAL_DNS_SPF_INCLUDE:-}
      POSTAL_DNS_RETURN_PATH_DOMAIN: ${POSTAL_DNS_RETURN_PATH_DOMAIN:-}
      POSTAL_DNS_ROUTE_DOMAIN: ${POSTAL_DNS_ROUTE_DOMAIN:-}
      POSTAL_DNS_TRACK_DOMAIN: ${POSTAL_DNS_TRACK_DOMAIN:-}
    command: [ "node", "/scripts/init.mjs" ]
    volumes:
      - ./scripts/postal:/scripts:ro
      - postal_config_data:/config

  # Fixes ownership then runs DB schema setup and migrations.
  postal-init:
    image: ${POSTAL_IMAGE:-ghcr.io/postalserver/postal:latest}
    user: "0:0"
    restart: "no"
    depends_on:
      postal-config:
        condition: service_completed_successfully
      postal-db:
        condition: service_healthy
    environment:
      POSTAL_CONFIG_FILE_PATH: /config/postal.yml
      POSTAL_SIGNING_KEY_PATH: /config/signing.key
      WAIT_FOR_TIMEOUT: 90
      WAIT_FOR_TARGETS: postal-db:3306
    command:
      - /bin/sh
      - -ec
      - |
        chown -R 999:999 /config
        chmod 600 /config/signing.key
        chmod 640 /config/postal.yml
        postal initialize
        postal update
    volumes:
      - postal_config_data:/config

  postal-db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${POSTAL_DB_NAME:-postal}
      MARIADB_ROOT_PASSWORD: ${POSTAL_DB_ROOT_PASSWORD:-postal}
    expose:
      - "3306"
    volumes:
      - postal_db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD-SHELL", "mariadb-admin ping --host=127.0.0.1 --user=root --password=${POSTAL_DB_ROOT_PASSWORD:-postal}" ]
      interval: 10s
      timeout: 5s
      retries: 10

  postal-web:
    <<: *postal-runtime-common
    depends_on:
      <<: *postal-depends-on
    command: [ "bundle", "exec", "puma", "-C", "config/puma.rb" ]
    environment:
      BIND_ADDRESS: 0.0.0.0
      PORT: 5000
      POSTAL_ALLOWED_HOSTS: ${POSTAL_ALLOWED_HOSTS:-}
    expose:
      - "5000"
    volumes:
      - postal_config_data:/config
      - ./scripts/postal/host_authorization.rb:/opt/postal/app/config/initializers/99_host_authorization.rb:ro
    healthcheck:
      test: [ "CMD-SHELL", "nc -z 127.0.0.1 5000" ]
      interval: 10s
      timeout: 5s
      retries: 10

  postal-worker:
    <<: *postal-runtime-common
    depends_on:
      <<: *postal-depends-on
      postal-web:
        condition: service_started
    command: [ "bundle", "exec", "ruby", "script/worker.rb" ]

  postal-smtp:
    <<: *postal-runtime-common
    depends_on:
      <<: *postal-depends-on
      postal-web:
        condition: service_started
    command: [ "bundle", "exec", "ruby", "script/smtp_server.rb" ]
    expose:
      - "25"
    healthcheck:
      test: [ "CMD-SHELL", "nc -z 127.0.0.1 25" ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postal_db_data:
  postal_config_data:
