services:
  postgres:
    extends:
      file: docker-compose.yml
      service: postgres

  redis:
    extends:
      file: docker-compose.yml
      service: redis

  listmonk-db:
    extends:
      file: docker-compose.listmonk.yml
      service: listmonk-db

  listmonk-init:
    extends:
      file: docker-compose.listmonk.yml
      service: listmonk-init

  listmonk-app:
    extends:
      file: docker-compose.listmonk.yml
      service: listmonk-app

  app:
    extends:
      file: docker-compose.yml
      service: app

  stalwart-db:
    extends:
      file: docker-compose.stalwart.yml
      service: stalwart-db

  stalwart-redis:
    extends:
      file: docker-compose.stalwart.yml
      service: stalwart-redis

  stalwart-minio:
    extends:
      file: docker-compose.stalwart.yml
      service: stalwart-minio

  stalwart-minio-init:
    extends:
      file: docker-compose.stalwart.yml
      service: stalwart-minio-init

  stalwart-config:
    extends:
      file: docker-compose.stalwart.yml
      service: stalwart-config

  stalwart:
    extends:
      file: docker-compose.stalwart.yml
      service: stalwart

  # ── Webmail clients ──────────────────────────────────────────────────────
  # Bulwark is the default webmail client (web-only, richer features).
  # See docker-compose.bulwark.yml for full configuration options.
  bulwark-web:
    extends:
      file: docker-compose.bulwark.yml
      service: bulwark-web

  # Twake Mail (tmail-web) is an alternative webmail client.
  # To use it instead of Bulwark, uncomment this block (and comment out bulwark-web above).
  # tmail-web:
  #   extends:
  #     file: docker-compose.stalwart.yml
  #     service: tmail-web

  postal-config:
    extends:
      file: docker-compose.postal.yml
      service: postal-config

  postal-init:
    extends:
      file: docker-compose.postal.yml
      service: postal-init

  postal-db:
    extends:
      file: docker-compose.postal.yml
      service: postal-db

  postal-web:
    extends:
      file: docker-compose.postal.yml
      service: postal-web

  postal-worker:
    extends:
      file: docker-compose.postal.yml
      service: postal-worker

  postal-smtp:
    extends:
      file: docker-compose.postal.yml
      service: postal-smtp

volumes:
  postgres_data:
  redis_data:
  listmonk_db_data:
  listmonk_config_data:
  listmonk_uploads_data:
  stalwart_data:
  stalwart_db_data:
  stalwart_redis_data:
  stalwart_minio_data:
  postal_db_data:
  postal_config_data:
