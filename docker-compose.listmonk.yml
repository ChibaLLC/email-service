# Optional Listmonk local overlay.
# Use with docker-compose.dev.yml through `pnpm dev:start:listmonk`, `pnpm listmonk:up`,
# or together with Postal through `pnpm dev:start:all`.

services:
  listmonk-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${LISTMONK_DB_USER:-listmonk}
      POSTGRES_PASSWORD: ${LISTMONK_DB_PASSWORD:-listmonk}
      POSTGRES_DB: ${LISTMONK_DB_NAME:-listmonk}
    expose:
      - "5432"
    volumes:
      - listmonk_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LISTMONK_DB_USER:-listmonk}"]
      interval: 10s
      timeout: 5s
      retries: 10

  listmonk-app:
    image: ${LISTMONK_IMAGE:-listmonk/listmonk:latest}
    restart: unless-stopped
    depends_on:
      listmonk-db:
        condition: service_healthy
    command: ["sh", "-c", "./listmonk --install --idempotent --yes --config /listmonk/config/config.toml && ./listmonk --upgrade --yes --config /listmonk/config/config.toml && ./listmonk --config /listmonk/config/config.toml"]
    environment:
      TZ: ${LISTMONK_TIMEZONE:-Etc/UTC}
      LISTMONK_ADMIN_USER: ${LISTMONK_ADMIN_USER:-}
      LISTMONK_ADMIN_PASSWORD: ${LISTMONK_ADMIN_PASSWORD:-}
    expose:
      - "9000"
    volumes:
      - listmonk_config_data:/listmonk/config
      - listmonk_uploads_data:/listmonk/uploads
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9000"]
      interval: 10s
      timeout: 5s
      retries: 10

  listmonk-init:
    image: alpine:3.20
    restart: "no"
    command:
      - /bin/sh
      - -ec
      - |
        mkdir -p /config /uploads
        cat > /config/config.toml <<'EOF'
        [app]
        address = "0.0.0.0:${LISTMONK_APP_PORT:-9000}"

        [db]
        host = "listmonk-db"
        port = 5432
        user = "${LISTMONK_DB_USER:-listmonk}"
        password = "${LISTMONK_DB_PASSWORD:-listmonk}"
        database = "${LISTMONK_DB_NAME:-listmonk}"
        ssl_mode = "disable"
        max_open = 25
        max_idle = 25
        max_lifetime = "300s"
        EOF
    volumes:
      - listmonk_config_data:/config
      - listmonk_uploads_data:/uploads


volumes:
  listmonk_db_data:
  listmonk_uploads_data: