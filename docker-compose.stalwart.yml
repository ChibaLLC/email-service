# Production-oriented Stalwart overlay.
# Includes dedicated PostgreSQL, Redis, and MinIO services and preconfigures
# Stalwart to use them from first boot.

services:
  stalwart-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${STALWART_DB_USER:-stalwart}
      - POSTGRES_PASSWORD=${STALWART_DB_PASSWORD:-stalwart}
      - POSTGRES_DB=${STALWART_DB_NAME:-stalwart}
    expose:
      - "5432"
    volumes:
      - stalwart_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STALWART_DB_USER:-stalwart}"]
      interval: 10s
      timeout: 5s
      retries: 10

  stalwart-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${STALWART_REDIS_PASSWORD:-stalwart}
    expose:
      - "6379"
    volumes:
      - stalwart_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${STALWART_REDIS_PASSWORD:-stalwart} ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  stalwart-minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${STALWART_MINIO_ROOT_USER:-stalwart}
      - MINIO_ROOT_PASSWORD=${STALWART_MINIO_ROOT_PASSWORD:-stalwart-minio}
    expose:
      - "9000"
      - "9001"
    volumes:
      - stalwart_minio_data:/data

  stalwart-minio-init:
    image: minio/mc:latest
    restart: "no"
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until mc alias set local http://stalwart-minio:9000 "$$STALWART_MINIO_ROOT_USER" "$$STALWART_MINIO_ROOT_PASSWORD"; do sleep 2; done;
        mc mb --ignore-existing "local/$$STALWART_MINIO_BUCKET"
    depends_on:
      stalwart-minio:
        condition: service_started
    environment:
      - STALWART_MINIO_ROOT_USER=${STALWART_MINIO_ROOT_USER:-stalwart}
      - STALWART_MINIO_ROOT_PASSWORD=${STALWART_MINIO_ROOT_PASSWORD:-stalwart-minio}
      - STALWART_MINIO_BUCKET=${STALWART_MINIO_BUCKET:-stalwart}

  stalwart-config:
    image: node:20-alpine
    restart: "no"
    environment:
      - STALWART_CONFIG_PATH=/opt/stalwart/etc/config.toml
      - STALWART_HOSTNAME=${STALWART_HOSTNAME:-mail.example.com}
      - STALWART_ADMIN_USER=${STALWART_ADMIN_USER:-admin}
      - STALWART_ADMIN_PASSWORD=${STALWART_ADMIN_PASSWORD:-change-me-stalwart-admin}
      - STALWART_ACME_ENABLED=${STALWART_ACME_ENABLED:-false}
      - STALWART_ACME_DIRECTORY=${STALWART_ACME_DIRECTORY:-https://acme-v02.api.letsencrypt.org/directory}
      - STALWART_ACME_CHALLENGE=${STALWART_ACME_CHALLENGE:-tls-alpn-01}
      - STALWART_ACME_CONTACT=${STALWART_ACME_CONTACT:-}
      - STALWART_ACME_DOMAINS=${STALWART_ACME_DOMAINS:-}
      - STALWART_ACME_CACHE=${STALWART_ACME_CACHE:-%{BASE_PATH}%/etc/acme}
      - STALWART_ACME_RENEW_BEFORE=${STALWART_ACME_RENEW_BEFORE:-30d}
      - STALWART_ACME_DEFAULT=${STALWART_ACME_DEFAULT:-true}
      - STALWART_PROXY_TRUSTED_NETWORKS=${STALWART_PROXY_TRUSTED_NETWORKS:-}
      - STALWART_PROXY_AUTODETECT=${STALWART_PROXY_AUTODETECT:-false}
      - STALWART_DOCKER_SOCKET_PATH=${STALWART_DOCKER_SOCKET_PATH:-/var/run/docker.sock}
      - STALWART_HTTP_USE_X_FORWARDED=${STALWART_HTTP_USE_X_FORWARDED:-false}
      - STALWART_DB_USER=${STALWART_DB_USER:-stalwart}
      - STALWART_DB_PASSWORD=${STALWART_DB_PASSWORD:-stalwart}
      - STALWART_DB_NAME=${STALWART_DB_NAME:-stalwart}
      - STALWART_REDIS_PASSWORD=${STALWART_REDIS_PASSWORD:-stalwart}
      - STALWART_MINIO_ROOT_USER=${STALWART_MINIO_ROOT_USER:-stalwart}
      - STALWART_MINIO_ROOT_PASSWORD=${STALWART_MINIO_ROOT_PASSWORD:-stalwart-minio}
      - STALWART_MINIO_BUCKET=${STALWART_MINIO_BUCKET:-stalwart}
      - STALWART_MINIO_REGION=${STALWART_MINIO_REGION:-us-east-1}
      - STALWART_MINIO_ENDPOINT=http://stalwart-minio:9000
    command: ["node", "/scripts/init.mjs"]
    volumes:
      - ./scripts/stalwart:/scripts:ro
      - stalwart_data:/opt/stalwart
      - /var/run/docker.sock:/var/run/docker.sock:ro

  stalwart:
    image: ${STALWART_IMAGE:-stalwartlabs/stalwart:latest}
    restart: unless-stopped
    depends_on:
      stalwart-db:
        condition: service_healthy
      stalwart-redis:
        condition: service_healthy
      stalwart-minio-init:
        condition: service_completed_successfully
      stalwart-config:
        condition: service_completed_successfully
    labels:
      - traefik.enable=${STALWART_TRAEFIK_ENABLED:-false}
      - traefik.docker.network=${STALWART_TRAEFIK_DOCKER_NETWORK:-${COMPOSE_PROJECT_NAME:-email-service}_default}
      - "traefik.http.routers.mailserver.rule=Host(`${STALWART_HOSTNAME:-mail.example.com}`) || Host(`${STALWART_AUTODISCOVER_HOSTNAME:-autodiscover.example.com}`) || Host(`${STALWART_AUTOCONFIG_HOSTNAME:-autoconfig.example.com}`) || Host(`${STALWART_MTA_STS_HOSTNAME:-mta-sts.example.com}`)"
      - traefik.http.routers.mailserver.entrypoints=${STALWART_TRAEFIK_HTTPS_ENTRYPOINT:-https}
      - traefik.http.routers.mailserver.service=mailserver
      - traefik.http.services.mailserver.loadbalancer.server.port=8080
      - "traefik.tcp.routers.smtp.rule=HostSNI(`*`)"
      - traefik.tcp.routers.smtp.entrypoints=${STALWART_TRAEFIK_SMTP_ENTRYPOINT:-smtp}
      - traefik.tcp.routers.smtp.service=smtp
      - traefik.tcp.services.smtp.loadbalancer.server.port=25
      - traefik.tcp.services.smtp.loadbalancer.proxyProtocol.version=2
      - "traefik.tcp.routers.jmap.rule=HostSNI(`*`)"
      - traefik.tcp.routers.jmap.tls.passthrough=true
      - traefik.tcp.routers.jmap.entrypoints=${STALWART_TRAEFIK_HTTPS_ENTRYPOINT:-https}
      - traefik.tcp.routers.jmap.service=jmap
      - traefik.tcp.services.jmap.loadbalancer.server.port=443
      - traefik.tcp.services.jmap.loadbalancer.proxyProtocol.version=2
      - "traefik.tcp.routers.smtps.rule=HostSNI(`*`)"
      - traefik.tcp.routers.smtps.tls.passthrough=true
      - traefik.tcp.routers.smtps.entrypoints=${STALWART_TRAEFIK_SMTPS_ENTRYPOINT:-smtps}
      - traefik.tcp.routers.smtps.service=smtps
      - traefik.tcp.services.smtps.loadbalancer.server.port=465
      - traefik.tcp.services.smtps.loadbalancer.proxyProtocol.version=2
      - "traefik.tcp.routers.imaps.rule=HostSNI(`*`)"
      - traefik.tcp.routers.imaps.tls.passthrough=true
      - traefik.tcp.routers.imaps.entrypoints=${STALWART_TRAEFIK_IMAPS_ENTRYPOINT:-imaps}
      - traefik.tcp.routers.imaps.service=imaps
      - traefik.tcp.services.imaps.loadbalancer.server.port=993
      - traefik.tcp.services.imaps.loadbalancer.proxyProtocol.version=2
    ports:
      - "25:25"
      - "587:587"
      - "465:465"
      - "143:143"
      - "993:993"
      - "110:110"
      - "995:995"
      - "4190:4190"
    volumes:
      - stalwart_data:/opt/stalwart

volumes:
  stalwart_data:
  stalwart_db_data:
  stalwart_redis_data:
  stalwart_minio_data: