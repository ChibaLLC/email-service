# Production-oriented Stalwart overlay.
# Includes dedicated PostgreSQL, Redis, and MinIO services and preconfigures
# Stalwart to use them from first boot.

services:
  stalwart-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${STALWART_DB_USER:-stalwart}
      POSTGRES_PASSWORD: ${STALWART_DB_PASSWORD:-stalwart}
      POSTGRES_DB: ${STALWART_DB_NAME:-stalwart}
    expose:
      - "5432"
    volumes:
      - stalwart_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STALWART_DB_USER:-stalwart}"]
      interval: 10s
      timeout: 5s
      retries: 10

  stalwart-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${STALWART_REDIS_PASSWORD:-stalwart}
    expose:
      - "6379"
    volumes:
      - stalwart_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${STALWART_REDIS_PASSWORD:-stalwart} ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  stalwart-minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STALWART_MINIO_ROOT_USER:-stalwart}
      MINIO_ROOT_PASSWORD: ${STALWART_MINIO_ROOT_PASSWORD:-stalwart-minio}
    expose:
      - "9000"
      - "9001"
    volumes:
      - stalwart_minio_data:/data

  stalwart-minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      stalwart-minio:
        condition: service_started
    environment:
      STALWART_MINIO_ROOT_USER: ${STALWART_MINIO_ROOT_USER:-stalwart}
      STALWART_MINIO_ROOT_PASSWORD: ${STALWART_MINIO_ROOT_PASSWORD:-stalwart-minio}
      STALWART_MINIO_BUCKET: ${STALWART_MINIO_BUCKET:-stalwart}
    command:
      - /bin/sh
      - -ec
      - |
        until mc alias set local http://stalwart-minio:9000 "$${STALWART_MINIO_ROOT_USER}" "$${STALWART_MINIO_ROOT_PASSWORD}"; do
          sleep 2
        done
        mc mb --ignore-existing "local/$${STALWART_MINIO_BUCKET}"

  stalwart-config:
    image: node:20-alpine
    restart: "no"
    environment:
      STALWART_CONFIG_PATH: /opt/stalwart/etc/config.toml
      STALWART_HOSTNAME: ${STALWART_HOSTNAME:-mail.example.com}
      STALWART_DB_USER: ${STALWART_DB_USER:-stalwart}
      STALWART_DB_PASSWORD: ${STALWART_DB_PASSWORD:-stalwart}
      STALWART_DB_NAME: ${STALWART_DB_NAME:-stalwart}
      STALWART_REDIS_PASSWORD: ${STALWART_REDIS_PASSWORD:-stalwart}
      STALWART_MINIO_ROOT_USER: ${STALWART_MINIO_ROOT_USER:-stalwart}
      STALWART_MINIO_ROOT_PASSWORD: ${STALWART_MINIO_ROOT_PASSWORD:-stalwart-minio}
      STALWART_MINIO_BUCKET: ${STALWART_MINIO_BUCKET:-stalwart}
      STALWART_MINIO_REGION: ${STALWART_MINIO_REGION:-us-east-1}
      STALWART_MINIO_ENDPOINT: http://stalwart-minio:9000
    command: ["node", "/scripts/init.mjs"]
    volumes:
      - ./scripts/stalwart:/scripts:ro
      - stalwart_data:/opt/stalwart

  stalwart:
    image: ${STALWART_IMAGE:-stalwartlabs/stalwart:latest}
    restart: unless-stopped
    depends_on:
      stalwart-db:
        condition: service_healthy
      stalwart-redis:
        condition: service_healthy
      stalwart-minio-init:
        condition: service_completed_successfully
      stalwart-config:
        condition: service_completed_successfully
    ports:
      - "25:25"
      - "587:587"
      - "465:465"
      - "143:143"
      - "993:993"
      - "110:110"
      - "995:995"
      - "4190:4190"
    expose:
      - "8080"
      - "443"
    volumes:
      - stalwart_data:/opt/stalwart

volumes:
  stalwart_data:
  stalwart_db_data:
  stalwart_redis_data:
  stalwart_minio_data: